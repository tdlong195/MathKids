name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          git diff origin/main..pr-branch > /tmp/changes.diff
          cat /tmp/changes.diff

      - name: Review with Claude
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          python3 << 'EOF'
          import os
          import subprocess
          import json
          from pathlib import Path

          # Read the diff
          diff_file = Path("/tmp/changes.diff")
          if not diff_file.exists() or diff_file.stat().st_size == 0:
              print("No changes to review")
              exit(0)

          with open(diff_file) as f:
              diff = f.read()

          # Prepare the review prompt
          prompt = f"""You are a code reviewer for a Next.js + TypeScript math learning app for children.

Review this PR diff and provide concise, actionable feedback:

DIFF:
```
{diff}
```

Focus on:
1. Code quality & best practices
2. TypeScript types & safety
3. Performance issues
4. Security concerns
5. UX for children (animations, touch targets, accessibility)

Format as markdown. Keep it brief and actionable."""

          # Call Claude API
          import anthropic
          client = anthropic.Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])

          message = client.messages.create(
              model="claude-opus-4-8",
              max_tokens=1024,
              messages=[
                  {{"role": "user", "content": prompt}}
              ]
          )

          review = message.content[0].text

          # Save review for next step
          with open("/tmp/review.txt", "w") as f:
              f.write(review)

          print(review)
          EOF

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewFile = '/tmp/review.txt';

            let review = '';
            if (fs.existsSync(reviewFile)) {
              review = fs.readFileSync(reviewFile, 'utf8');
            } else {
              review = 'PR review could not be completed.';
            }

            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: `## 🤖 Claude AI Review\n\n${review}`,
              event: 'COMMENT'
            });
